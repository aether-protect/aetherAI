version: 0.2

# Aether Protect V2 SecureBERT Inference Container Build

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPO_NAME
      - IMAGE_TAG=${CODEBUILD_RESOLVED_SOURCE_VERSION:=latest}
  build:
    commands:
      - echo Build started on `date`
      - echo Building unified inference container...
      - cp agent/model/inference_engine.py agent/sagemaker/inference_engine.py
      - cd agent/sagemaker
      - docker build -t $REPOSITORY_URI:latest .
      - rm -f inference_engine.py
      - docker tag $REPOSITORY_URI:latest $REPOSITORY_URI:$IMAGE_TAG
  post_build:
    commands:
      - echo Build completed on `date`
      - echo Pushing the Docker image...
      - docker push $REPOSITORY_URI:latest
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo Writing image URI to artifacts...
      - echo $REPOSITORY_URI:latest > /tmp/image_uri.txt
artifacts:
  files:
    - /tmp/image_uri.txt
  discard-paths: yes
